name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: praha211
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d praha211"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/praha211?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret-for-tests
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      HEALTHCHECK_SECRET: ci-healthcheck-secret
      R2_ACCOUNT_ID: ci-account
      R2_ACCESS_KEY_ID: ci-access-key
      R2_SECRET_ACCESS_KEY: ci-secret
      R2_BUCKET_NAME: ci-bucket
      R2_ENDPOINT: https://example.invalid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare .env for test scripts
        run: |
          cat > .env <<EOF
          DATABASE_URL=${DATABASE_URL}
          NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
          NEXTAUTH_URL=${NEXTAUTH_URL}
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
          HEALTHCHECK_SECRET=${HEALTHCHECK_SECRET}
          R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET_NAME=${R2_BUCKET_NAME}
          R2_ENDPOINT=${R2_ENDPOINT}
          EOF

      - name: Run database migrations
        run: npm run prisma:migrate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run integration/API tests
        run: npm run test:integration:all
